version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tennis-store
      POSTGRES_PASSWORD: tennis-store
      POSTGRES_DB: tennis-store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tennis-store-network

  # Redis Service for Events, Caching, and Job Queues
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tennis-store-network

  # Medusa Backend Service
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    image: tennis-store-backend:latest
    environment:
      DATABASE_URL: postgres://tennis-store:tennis-store@postgres:5432/tennis-store
      DB_NAME: tennis-store
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      COOKIE_SECRET: ${COOKIE_SECRET:-supersecret}
      STORE_CORS: ${STORE_CORS:-http://localhost:8000,http://127.0.0.1:8000}
      ADMIN_CORS: ${ADMIN_CORS:-http://localhost:5173,http://localhost:9000}
      AUTH_CORS: ${AUTH_CORS:-http://localhost:5173,http://localhost:9000,http://localhost:8000}
    ports:
      - "9000:9000"
    networks:
      - tennis-store-network
    depends_on:
      - postgres
      - redis

  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
      args:
        NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: pk_17c7f134268d580d4937fe4b1941a3796e845cfcd04c4962a5c7aab932dd9c92
        NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000
        NEXT_PUBLIC_DEFAULT_REGION: fr
        NEXT_PUBLIC_BASE_URL: http://localhost:8000
    image: tennis-store-storefront:latest
    environment:
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://host.docker.internal
      NEXT_PUBLIC_BASE_URL: http://localhost:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    networks:
      - tennis-store-network

  proxy:
    image: caddy:2-alpine
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - tennis-store-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  caddy_data:
  caddy_config:

networks:
  tennis-store-network:
    driver: bridge
