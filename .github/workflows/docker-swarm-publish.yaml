name: aceline docker swarm publish

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy Config Files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-stack.yml"
          target: "~/tennis-store/"

      - name: Deploy to Docker Swarm
        uses: appleboy/ssh-action@master
        env:
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
          NEXT_PUBLIC_DEFAULT_REGION: ${{ vars.NEXT_PUBLIC_DEFAULT_REGION || 'dk' }}
          NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL }}
          BACKEND_DOMAIN: ${{ vars.BACKEND_DOMAIN || secrets.BACKEND_DOMAIN }}
          STORE_DOMAIN: ${{ vars.STORE_DOMAIN || secrets.STORE_DOMAIN }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL || secrets.ACME_EMAIL }}
          R2_BUCKET_NAME: "${{secrets.R2_BUCKET_NAME}}"
          R2_ACCESS_KEY_ID: "${{secrets.R2_ACCESS_KEY_ID}}"
          R2_SECRET_ACCESS_KEY: "${{secrets.R2_SECRET_ACCESS_KEY}}"
          R2_ACCOUNT_ID: "${{secrets.R2_ACCOUNT_ID}}"
          R2_PUBLIC_URL: "${{vars.R2_PUBLIC_URL}}"

        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_USER,DB_PASSWORD,DB_NAME,JWT_SECRET,COOKIE_SECRET,NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY,NEXT_PUBLIC_MEDUSA_BACKEND_URL,NEXT_PUBLIC_DEFAULT_REGION,NEXT_PUBLIC_BASE_URL,BACKEND_DOMAIN,STORE_DOMAIN,ACME_EMAIL
          script: |
            mkdir -p ~/tennis-store
            cd ~/tennis-store
            # Log in to Docker Hub on VPS to pull the newly built images
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ github.repository_owner }}" --password-stdin
            # Deploy the Swarm stack
            docker stack deploy -c docker-stack.yml tennis-store --with-registry-auth
