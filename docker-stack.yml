version: "3.8"

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tennis-store
      POSTGRES_PASSWORD: tennis-store
      POSTGRES_DB: tennis-store
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tennis-store-network

  # Redis Service for Events, Caching, and Job Queues
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tennis-store-network

  # Traefik Reverse Proxy with Swarm integration and automatic SSL certificates
  traefik:
    image: traefik:v3.6.1
    command:
      # Enable Swarm provider
      - "--providers.swarm=true"
      - "--providers.swarm.exposedByDefault=false"
      - "--providers.swarm.network=tennis-store-network"
      # Entrypoints for HTTP (web) and HTTPS (websecure)
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Global Redirection: HTTP to HTTPS
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Automatic SSL certificates via Let's Encrypt TLS challenge
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL:-contact@aceline.online}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "traefik_certificates:/letsencrypt"
    networks:
      - tennis-store-network
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # Medusa Backend Service
  backend:
    image: rojbeni/tennis-store-backend:latest
    environment:
      DATABASE_URL: postgres://tennis-store:tennis-store@postgres:5432/tennis-store
      DB_NAME: tennis-store
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      COOKIE_SECRET: ${COOKIE_SECRET:-supersecret}
      STORE_CORS: ${STORE_CORS:-http://localhost:8000,http://127.0.0.1:8000}
      ADMIN_CORS: ${ADMIN_CORS:-http://localhost:5173,http://localhost:9000}
      AUTH_CORS: ${AUTH_CORS:-http://localhost:5173,http://localhost:9000,http://localhost:8000}
    # Secure: Disable direct port mapping so all public traffic routes securely via Traefik over HTTPS
    # ports:
    #   - "9000:9000"
    networks:
      - tennis-store-network
    depends_on:
      - postgres
      - redis
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.backend.rule=Host(`${BACKEND_DOMAIN:-aceline.online}`)"
        - "traefik.http.routers.backend.entrypoints=websecure"
        - "traefik.http.routers.backend.tls=true"
        - "traefik.http.routers.backend.tls.certresolver=myresolver"
        - "traefik.http.services.backend.loadbalancer.server.port=9000"

  # Storefront Service (Frontend)
  # storefront:
  #   image: rojbeni/store-storefront:latest
  #   # Secure: Disable direct port mapping so all public traffic routes securely via Traefik over HTTPS
  #   # ports:
  #   #   - "8000:8000"
  #   networks:
  #     - tennis-store-network
  #   environment:
  #     PORT: 8000
  #     NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY:-pk_0569965e5bebf301671cc77763b3745535ce6381e64acf5c314efdc8f056b02f}
  #     NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL:-http://localhost:8001}
  #     NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION:-dk}
  #     NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:8000}
  #   depends_on:
  #     - backend
  #   deploy:
  #     replicas: 1
  #     restart_policy:
  #       condition: on-failure
  #     labels:
  #       - "traefik.enable=true"
  #       - "traefik.http.routers.storefront.rule=Host(`${STORE_DOMAIN:-aceline.online}`)"
  #       - "traefik.http.routers.storefront.entrypoints=websecure"
  #       - "traefik.http.routers.storefront.tls=true"
  #       - "traefik.http.routers.storefront.tls.certresolver=myresolver"
  #       - "traefik.http.services.storefront.loadbalancer.server.port=8000"

volumes:
  postgres_data:
  redis_data:
  traefik_certificates:

networks:
  tennis-store-network:
    driver: overlay
